<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="pricingSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D8E4EC"/>
      <stop offset="40%" stop-color="#E6EDE4"/>
      <stop offset="100%" stop-color="#EBE6D8"/>
    </linearGradient>
    <linearGradient id="pricingHaze" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5E8CC" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#D4C4A8" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="pricingMeadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A8BFA8" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#C9B896" stop-opacity="0.35"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="900" fill="url(#pricingSky)"/>
  <rect width="1920" height="900" fill="url(#pricingHaze)"/>
  <!-- soft distant ridges -->
  <path d="M0 420 L320 300 L640 380 L960 260 L1280 360 L1600 240 L1920 340 L1920 900 L0 900 Z" fill="#B8C8BC" opacity="0.55"/>
  <path d="M0 520 L400 400 L780 480 L1100 360 L1500 440 L1920 380 L1920 900 L0 900 Z" fill="#A8B8AA" opacity="0.45"/>
  <!-- golden meadow foreground -->
  <path d="M0 620 Q480 560 960 600 T1920 620 L1920 900 L0 900 Z" fill="url(#pricingMeadow)"/>
  <path d="M0 700 Q640 640 1280 680 T1920 700 L1920 900 L0 900 Z" fill="#D4C4A8" opacity="0.25"/>
  <!-- subtle sun glow -->
  <circle cx="1520" cy="180" r="120" fill="#F5E8CC" opacity="0.35"/>
  <circle cx="1520" cy="180" r="70" fill="#FFF8EE" opacity="0.25"/>
</svg>
