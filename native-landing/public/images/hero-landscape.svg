<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8E2D4"/>
      <stop offset="40%" stop-color="#E5EDE0"/>
      <stop offset="100%" stop-color="#F2EBD9"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9BB5A8" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#B0C9BA" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#8AA898" stop-opacity="0.45"/>
    </linearGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#sky)"/>
  <!-- distant mountains -->
  <path d="M0 520 L280 280 L520 420 L760 220 L980 380 L1180 180 L1420 340 L1680 200 L1920 360 L1920 1080 L0 1080 Z" fill="#B8C9B0" opacity="0.65"/>
  <path d="M0 580 L360 360 L640 480 L900 300 L1150 460 L1480 320 L1920 500 L1920 1080 L0 1080 Z" fill="#9FB89E" opacity="0.5"/>
  <!-- snow caps -->
  <path d="M720 250 L760 220 L800 250 Z" fill="#F5F2EA" opacity="0.85"/>
  <path d="M1140 210 L1180 180 L1220 210 Z" fill="#F5F2EA" opacity="0.85"/>
  <!-- lake -->
  <ellipse cx="960" cy="700" rx="920" ry="180" fill="url(#water)"/>
  <ellipse cx="960" cy="710" rx="780" ry="120" fill="#C5D8CC" opacity="0.32"/>
  <!-- pine trees left -->
  <g fill="#3D5A45" opacity="0.8">
    <path d="M120 620 L150 520 L180 620 Z"/><rect x="145" y="620" width="10" height="40"/>
    <path d="M200 650 L230 540 L260 650 Z"/><rect x="225" y="650" width="10" height="45"/>
    <path d="M280 630 L310 500 L340 630 Z"/><rect x="305" y="630" width="12" height="50"/>
  </g>
  <!-- pine trees right (forest echo) -->
  <g fill="#3A5540" opacity="0.55">
    <path d="M1580 600 L1605 510 L1630 600 Z"/><rect x="1600" y="600" width="8" height="35"/>
    <path d="M1660 620 L1690 500 L1720 620 Z"/><rect x="1685" y="620" width="10" height="42"/>
    <path d="M1740 590 L1770 470 L1800 590 Z"/><rect x="1765" y="590" width="10" height="48"/>
  </g>
  <!-- wildflowers foreground -->
  <g opacity="0.85">
    <circle cx="180" cy="820" r="8" fill="#F5F0E8" stroke="#D4C4A8" stroke-width="1"/>
    <circle cx="220" cy="840" r="6" fill="#8B9A7A"/>
    <circle cx="260" cy="815" r="7" fill="#F5F0E8" stroke="#D4C4A8" stroke-width="1"/>
    <circle cx="310" cy="845" r="5" fill="#6B8F71"/>
  </g>
  <!-- red boathouse right -->
  <g transform="translate(1480 560)">
    <rect x="0" y="80" width="120" height="90" fill="#8B4A3A" rx="2"/>
    <polygon points="0,80 60,20 120,80" fill="#9E5544"/>
    <rect x="45" y="120" width="30" height="50" fill="#5C3228"/>
    <rect x="10" y="145" width="100" height="8" fill="#6B4438"/>
    <rect x="15" y="170" width="6" height="60" fill="#5C4A3A"/>
    <rect x="100" y="170" width="6" height="60" fill="#5C4A3A"/>
  </g>
  <!-- rocky outcrop lower-left with bear character -->
  <ellipse cx="340" cy="880" rx="180" ry="45" fill="#8A9A82" opacity="0.55"/>
  <g transform="translate(300 780)">
    <ellipse cx="50" cy="70" rx="42" ry="38" fill="#6B5B4F"/>
    <circle cx="25" cy="35" r="14" fill="#6B5B4F"/>
    <circle cx="75" cy="35" r="14" fill="#6B5B4F"/>
    <circle cx="50" cy="55" r="28" fill="#7A6A5E"/>
    <circle cx="42" cy="50" r="4" fill="#2A2A2A"/>
    <circle cx="58" cy="50" r="4" fill="#2A2A2A"/>
    <ellipse cx="50" cy="58" rx="6" ry="4" fill="#4A3A30"/>
    <path d="M50 8 L53 18 L63 18 L55 24 L58 34 L50 28 L42 34 L45 24 L37 18 L47 18 Z" fill="#C9923A"/>
  </g>
  <!-- warm cream wash -->
  <rect width="1920" height="1080" fill="#F2EBD9" opacity="0.18"/>
</svg>
