<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DCE8F0"/>
      <stop offset="45%" stop-color="#E8F0EA"/>
      <stop offset="100%" stop-color="#F0EDE4"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8FAFC4" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#A8C4D4" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#7A9DB5" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#sky)"/>
  <!-- distant mountains -->
  <path d="M0 520 L280 280 L520 420 L760 220 L980 380 L1180 180 L1420 340 L1680 200 L1920 360 L1920 1080 L0 1080 Z" fill="#B8C9D8" opacity="0.7"/>
  <path d="M0 580 L360 360 L640 480 L900 300 L1150 460 L1480 320 L1920 500 L1920 1080 L0 1080 Z" fill="#9FB4C6" opacity="0.55"/>
  <!-- snow caps -->
  <path d="M720 250 L760 220 L800 250 Z" fill="#F8FAFC" opacity="0.9"/>
  <path d="M1140 210 L1180 180 L1220 210 Z" fill="#F8FAFC" opacity="0.9"/>
  <!-- lake -->
  <ellipse cx="960" cy="700" rx="920" ry="180" fill="url(#water)"/>
  <ellipse cx="960" cy="710" rx="780" ry="120" fill="#C5D8E4" opacity="0.35"/>
  <!-- pine trees left -->
  <g fill="#3D5A45" opacity="0.75">
    <path d="M120 620 L150 520 L180 620 Z"/><rect x="145" y="620" width="10" height="40"/>
    <path d="M200 650 L230 540 L260 650 Z"/><rect x="225" y="650" width="10" height="45"/>
    <path d="M280 630 L310 500 L340 630 Z"/><rect x="305" y="630" width="12" height="50"/>
  </g>
  <!-- wildflowers foreground -->
  <g opacity="0.85">
    <circle cx="180" cy="820" r="8" fill="#F5F0E8" stroke="#D4C4A8" stroke-width="1"/>
    <circle cx="220" cy="840" r="6" fill="#8B7EC8"/>
    <circle cx="260" cy="815" r="7" fill="#F5F0E8" stroke="#D4C4A8" stroke-width="1"/>
    <circle cx="310" cy="845" r="5" fill="#6B8F71"/>
  </g>
  <!-- red boathouse right -->
  <g transform="translate(1480 560)">
    <rect x="0" y="80" width="120" height="90" fill="#8B3A3A" rx="2"/>
    <polygon points="0,80 60,20 120,80" fill="#A04444"/>
    <rect x="45" y="120" width="30" height="50" fill="#5C2E2E"/>
    <rect x="10" y="145" width="100" height="8" fill="#6B4040"/>
    <!-- stilts -->
    <rect x="15" y="170" width="6" height="60" fill="#5C4A3A"/>
    <rect x="100" y="170" width="6" height="60" fill="#5C4A3A"/>
  </g>
  <!-- rocky outcrop lower-left with bear character -->
  <ellipse cx="340" cy="880" rx="180" ry="45" fill="#7A8B7E" opacity="0.6"/>
  <g transform="translate(300 780)">
    <!-- bear body -->
    <ellipse cx="50" cy="70" rx="42" ry="38" fill="#6B5B4F"/>
    <circle cx="25" cy="35" r="14" fill="#6B5B4F"/>
    <circle cx="75" cy="35" r="14" fill="#6B5B4F"/>
    <circle cx="50" cy="55" r="28" fill="#7A6A5E"/>
    <circle cx="42" cy="50" r="4" fill="#2A2A2A"/>
    <circle cx="58" cy="50" r="4" fill="#2A2A2A"/>
    <ellipse cx="50" cy="58" rx="6" ry="4" fill="#4A3A30"/>
    <!-- star on head -->
    <path d="M50 8 L53 18 L63 18 L55 24 L58 34 L50 28 L42 34 L45 24 L37 18 L47 18 Z" fill="#C9923A"/>
  </g>
  <!-- soft wash overlay -->
  <rect width="1920" height="1080" fill="#F0EDE4" opacity="0.12"/>
</svg>
