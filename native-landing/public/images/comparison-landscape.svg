<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="twilightSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E1035"/>
      <stop offset="35%" stop-color="#3D2463"/>
      <stop offset="70%" stop-color="#5C3A7A"/>
      <stop offset="100%" stop-color="#4A3058"/>
    </linearGradient>
    <linearGradient id="violetHaze" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#C9923A" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="ridgeFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B4C8A" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#3E2855" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="0.78" cy="0.18" r="0.35">
      <stop offset="0%" stop-color="#E9D5FF" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="phoneGlowPurple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E9D5FF"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <radialGradient id="porchGlowPurple" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#DDD6FE" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="900" fill="url(#twilightSky)"/>
  <rect width="1920" height="900" fill="url(#violetHaze)"/>
  <circle cx="1500" cy="160" r="90" fill="#F3E8FF" opacity="0.22"/>
  <ellipse cx="1500" cy="900" rx="1100" ry="280" fill="url(#moonGlow)"/>
  <path d="M0 380 L280 260 L560 340 L840 220 L1120 310 L1400 200 L1680 290 L1920 250 L1920 900 L0 900 Z" fill="#5A3D72" opacity="0.55"/>
  <path d="M0 480 L360 360 L680 430 L980 320 L1280 410 L1580 340 L1920 420 L1920 900 L0 900 Z" fill="url(#ridgeFill)"/>
  <path d="M0 600 Q480 540 960 570 T1920 590 L1920 900 L0 900 Z" fill="#2E1A42" opacity="0.65"/>
  <path d="M0 720 Q640 660 1280 700 T1920 710 L1920 900 L0 900 Z" fill="#1A0F28" opacity="0.35"/>
